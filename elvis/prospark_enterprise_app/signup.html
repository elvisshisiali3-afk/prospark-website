<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="ProSpark Cleaning Hub - Create your account">
  <title>Sign Up - ProSpark Cleaning Hub</title>
  
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/main.css">
  
  <style>
    .auth-form-side {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      background: var(--bg-primary);
    }

    .auth-form-wrapper {
      width: 100%;
      max-width: 450px;
    }

    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .auth-header h1 {
      font-size: var(--font-size-3xl);
      margin: 0 0 0.5rem 0;
    }

    .auth-brand-logo {
      font-size: 3rem;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="auth-form-side">
    <div class="auth-form-wrapper">
      <div class="auth-header">
        <div class="auth-brand-logo">✨</div>
        <h1>ProSpark</h1>
        <p style="color: var(--text-secondary); margin: 0;">Create Your Account</p>
      </div>

      <!-- Signup Form -->
      <form id="signup-form">
        <div class="grid grid-cols-2">
          <div class="form-group">
            <label for="signup-name">Full Name *</label>
            <input type="text" id="signup-name" placeholder="Your Name" required>
          </div>

          <div class="form-group">
            <label for="signup-phone">Phone Number *</label>
            <input type="tel" id="signup-phone" placeholder="0700000000" required>
          </div>
        </div>

        <div class="form-group">
          <label for="signup-email">Email Address *</label>
          <input type="email" id="signup-email" placeholder="you@example.com" required>
        </div>

        <div class="form-group">
          <label for="signup-address">Residential Address</label>
          <input type="text" id="signup-address" placeholder="Your address (optional)">
        </div>

        <div class="form-group">
          <label for="signup-password">Password *</label>
          <input type="password" id="signup-password" placeholder="At least 8 characters" minlength="8" required>
        </div>

        <div class="form-group">
          <label for="signup-confirm-password">Confirm Password *</label>
          <input type="password" id="signup-confirm-password" placeholder="Repeat password" required>
        </div>

        <div style="display: flex; align-items: flex-start; gap: 0.5rem; margin-bottom: 1.5rem;">
          <input type="checkbox" id="agree-terms" required style="margin-top: 0.25rem;">
          <label for="agree-terms" style="font-weight: normal; margin: 0;">
            I agree to the <a href="#terms" style="color: var(--color-champagne-gold);">Terms of Service</a> and <a href="#privacy" style="color: var(--color-champagne-gold);">Privacy Policy</a>
          </label>
        </div>

        <button type="submit" class="btn btn-primary btn-lg btn-block">Create Account</button>

        <p style="text-align: center; color: var(--text-secondary); margin-top: 1rem;">
          Already have an account? <a href="login.html" style="color: var(--color-champagne-gold);">Sign in</a>
        </p>
      </form>

      <!-- Features -->
      <div style="margin-top: 2rem; padding: 1.5rem; background: var(--bg-tertiary); border-radius: 0.75rem;">
        <p style="font-weight: bold; margin: 0 0 1rem 0; color: var(--text-primary);">Why join ProSpark?</p>
        <ul style="list-style: none; padding: 0; margin: 0;">
          <li style="display: flex; gap: 0.75rem; margin-bottom: 0.75rem;">
            <span style="color: var(--color-success);">✓</span>
            <span>Easy online booking system</span>
          </li>
          <li style="display: flex; gap: 0.75rem; margin-bottom: 0.75rem;">
            <span style="color: var(--color-success);">✓</span>
            <span>Real-time booking updates</span>
          </li>
          <li style="display: flex; gap: 0.75rem; margin-bottom: 0.75rem;">
            <span style="color: var(--color-success);">✓</span>
            <span>Loyalty rewards program</span>
          </li>
          <li style="display: flex; gap: 0.75rem;">
            <span style="color: var(--color-success);">✓</span>
            <span>Professional and insured cleaners</span>
          </li>
        </ul>
      </div>
    </div>
  </div>

  <!-- Alert Container -->
  <div id="alerts-container"></div>

  <script src="js/core/enterpriseServices.js"></script>
  <script src="js/auth/enterpriseAuth.js"></script>
  <script src="js/crm/crmManager.js"></script>
  <script src="js/finance/financeManager.js"></script>
  <script src="js/operations/operationsManager.js"></script>
  <script src="js/analytics/analyticsEngine.js"></script>
  <script src="js/admin/adminManager.js"></script>
  <script src="js/mobile/mobileManager.js"></script>

  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
